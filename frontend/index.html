<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KwazyCupcakes Streaming</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <header>
        <div class="logo">
            <h1>KwazyCupcakes</h1>
        </div>
        <div class="media-toggle">
            <button id="toggle-movie" class="type-btn active">Movies</button>
            <button id="toggle-tv" class="type-btn">TV Shows</button>
        </div>
        <div class="controls">
            <nav>
                <button id="btn-trending" class="nav-btn active">Trending</button>
                <button id="btn-top" class="nav-btn">Top Rated</button>
            </nav>
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Search..." autocomplete="off">
            </div>
        </div>
    </header>
    <main>
        <div id="section-title"><h2>Trending Movies</h2></div>
        <div id="media-grid" class="grid"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            Loading...
        </div>
    </main>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            
            <div class="close-container" id="close-player">
                <span class="back-arrow">&larr;</span> Back to Browse
            </div>

            <div id="tv-controls" class="tv-controls">
                <select id="season-select" class="dropdown"></select>
                <select id="episode-select" class="dropdown"></select>
            </div>

            <div class="video-container">
                <video id="native-player" controls autoplay crossorigin="anonymous"></video>
                <div id="player-loader" class="player-loader-overlay">
                    <div class="netflix-spinner"></div>
                    <p>Securing Stream Connection...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
